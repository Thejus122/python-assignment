{% extends 'store/base.html' %}

{% block content %}

<div class="row">

<div class="col-md-6">
<img src="{{ product.thumbnail }}" class="img-fluid">
</div>

<div class="col-md-6">

<h2>{{ product.title }}</h2>

<p>{{ product.description }}</p>

<h4>$ {{ product.price }}</h4>

<button class="btn btn-success">Add to Cart</button>

</div>

</div>

{% endblock %}
